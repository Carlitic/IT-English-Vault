<style>
.theme-toggle {
  margin-left: 1rem;
}
.theme-btn {
  background: var(--btn-bg, #21262d);
  border: 1px solid var(--btn-border, #30363d);
  border-radius: 6px;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  color: var(--btn-text, #c9d1d9);
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
}
.theme-btn:hover {
  background: var(--btn-bg-hover, #30363d);
  border-color: var(--btn-border-hover, #8b949e);
}
</style>

<div class="theme-toggle">
  <button class="theme-btn" id="theme-toggle-btn" title="Toggle Theme">
    <span id="theme-icon">☀️</span> <span id="theme-text">Light Mode</span>
  </button>
</div>

<script type="text/javascript">
  document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('theme-toggle-btn');
    const icon = document.getElementById('theme-icon');
    const text = document.getElementById('theme-text');
    
    function isDarkTheme() {
      const theme = jtd.getTheme();
      return theme === 'default' || theme === 'dark';
    }

    function updateBtn() {
      if (isDarkTheme()) {
        icon.innerHTML = '☀️';
        text.innerHTML = 'Light Mode';
        btn.style.setProperty('--btn-bg', '#21262d');
        btn.style.setProperty('--btn-border', '#30363d');
        btn.style.setProperty('--btn-text', '#c9d1d9');
        btn.style.setProperty('--btn-bg-hover', '#30363d');
        btn.style.setProperty('--btn-border-hover', '#8b949e');
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        icon.innerHTML = '🌙';
        text.innerHTML = 'Dark Mode';
        btn.style.setProperty('--btn-bg', '#f6f8fa');
        btn.style.setProperty('--btn-border', '#d0d7de');
        btn.style.setProperty('--btn-text', '#24292f');
        btn.style.setProperty('--btn-bg-hover', '#f3f4f6');
        btn.style.setProperty('--btn-border-hover', '#8c959f');
        document.documentElement.setAttribute('data-theme', 'light');
      }
    }

    if (typeof jtd !== 'undefined') {
      updateBtn();
      
      btn.addEventListener('click', function() {
        if (isDarkTheme()) {
          jtd.setTheme('light');
        } else {
          jtd.setTheme('default');
        }
        updateBtn();
      });
    }
  });
</script>
